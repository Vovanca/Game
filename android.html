<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SAGA: THE DEEP</title>
    <style>
        :root { 
            --grass: linear-gradient(#4CAF50, #2E7D32); 
            --dirt: linear-gradient(#795548, #3E2723); 
            --stone: linear-gradient(#757575, #212121);
            --gold-ore: radial-gradient(circle, #FFD700, #B8860B);
            --neon: #00f2ff;
        }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 6000px; height: 12000px; background: #0a0a10; }
        
        /* Текстуры блоков */
        .tile { position: absolute; width: 60px; height: 60px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.3); box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1); }
        .t-grass { background: var(--grass); border-top: 8px solid #1b5e20; }
        .t-dirt { background: var(--dirt); }
        .t-stone { background: var(--stone); }
        .t-gold { background: var(--gold-ore); border: 2px solid #FFD700; box-shadow: 0 0 10px #FFD700; }
        .t-chest { background: #6d4c41; border: 4px double #FFD700; }

        /* Игрок и Свет */
        #player { 
            width: 34px; height: 50px; background: var(--neon); position: absolute; 
            z-index: 1000; border-radius: 6px; box-shadow: 0 0 30px var(--neon); 
        }
        #light-aura {
            position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,242,255,0.15) 0%, transparent 70%);
            transform: translate(-133px, -125px); pointer-events: none;
        }

        /* Интерфейс */
        #hud { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid var(--neon); border-radius: 10px; z-index: 2000; width: 180px; }
        .quest-log { color: #FFD700; font-size: 11px; margin-top: 8px; border-top: 1px solid #444; padding-top: 5px; }

        /* Кнопки */
        #controls { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 4000; }
        .btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3px solid #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; backdrop-filter: blur(10px); text-shadow: 0 0 5px #000;
        }
        .btn:active { background: var(--neon); color: #000; border-color: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        <!-- Небо -->
        <div style="position:absolute; top:0; width:100%; height:600px; background:linear-gradient(#020024, #090979, #00d4ff);"></div>
        
        <div id="player" style="left: 300px; top: 400px;">
            <div id="light-aura"></div>
        </div>
        <div id="tiles"></div>
    </div>

    <div id="hud">
        <b style="color:var(--neon)">STATUS: SURVIVOR</b><br>
        GOLD: <span id="res-gold">0</span> | IRON: <span id="res-iron">0</span><br>
        DEPTH: <span id="res-depth">0</span>m
        <div class="quest-log" id="quest">QUEST: Find the Old Chest beneath the surface.</div>
    </div>
</div>

<div id="controls">
    <div style="display:flex; gap:15px;">
        <div class="btn" id="left">←</div>
        <div class="btn" id="right">→</div>
    </div>
    <div style="display:flex; gap:15px;">
        <div class="btn" id="dig" style="border-color:#FF9800">DIG</div>
        <div class="btn" id="jump" style="border-color:var(--neon)">UP</div>
    </div>
</div>

<script>
    const cfg = { tw: 60, rows: 200, cols: 50 }; // Мир в 2 раза больше
    let state = {
        x: 300, y: 400, vx: 0,
        inv: { gold: 0, iron: 0, wood: 0 },
        isDigging: false,
        storyPhase: 1
    };

    const world = document.getElementById('tiles');
    const player = document.getElementById('player');
    let map = {};

    function init() {
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r === 8) type = 'grass';
                else if(r > 8 && r < 25) type = 'dirt';
                else if(r >= 25) type = 'stone';

                // Рандомная генерация руд и сюжета
                if(type === 'stone' && Math.random() > 0.94) type = 'gold';
                if(r === 20 && c === 15) type = 'chest'; // Квестовый сундук

                if(type) {
                    const t = document.createElement('div');
                    t.className = `tile t-${type}`;
                    t.style.left = c * cfg.tw + 'px';
                    t.style.top = r * cfg.tw + 'px';
                    t.id = `t-${r}-${c}`;
                    world.appendChild(t);
                    map[`${r}-${c}`] = { el: t, type: type, hp: (type==='gold'?10:3) };
                }
            }
        }
        loop();
    }

    function loop() {
        state.x += state.vx;
        
        // Физика (пол под ногами)
        let r = Math.floor((state.y + 58) / cfg.tw);
        let c = Math.floor((state.x + 15) / cfg.tw);
        if(!map[`${r}-${c}`]) {
            state.y += 5; // Гравитация
        }

        // Копание
        if(state.isDigging) {
            let dr = Math.floor((state.y + 65) / cfg.tw);
            let dc = Math.floor((state.x + 15) / cfg.tw);
            let key = `${dr}-${dc}`;
            if(map[key]) {
                map[key].hp -= 0.15;
                map[key].el.style.filter = `brightness(${map[key].hp/3 + 0.5})`;
                if(map[key].hp <= 0) {
                    if(map[key].type === 'gold') state.inv.gold += 1;
                    if(map[key].type === 'chest') {
                        state.storyPhase = 2;
                        document.getElementById('quest').innerText = "QUEST: You found a map! Go deeper to 100m.";
                    }
                    map[key].el.remove();
                    delete map[key];
                    updateUI();
                }
            }
        }

        // Рендер
        player.style.left = state.x + 'px';
        player.style.top = state.y + 'px';
        document.getElementById('world').style.transform = `translate(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px)`;
        document.getElementById('res-depth').innerText = Math.floor(state.y/60 - 8);

        // Проверка сюжета по глубине
        if(state.storyPhase === 2 && state.y > 5000) {
            state.storyPhase = 3;
            document.getElementById('quest').innerText = "QUEST: Danger! You've entered the Forbidden Zone.";
        }

        requestAnimationFrame(loop);
    }

    function updateUI() {
        document.getElementById('res-gold').innerText = state.inv.gold;
    }

    const bind = (id, start, stop) => {
        const b = document.getElementById(id);
        b.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        b.addEventListener('touchend', (e) => { e.preventDefault(); stop(); });
    };

    bind('left', () => state.vx = -7, () => state.vx = 0);
    bind('right', () => state.vx = 7, () => state.vx = 0);
    bind('dig', () => state.isDigging = true, () => state.isDigging = false);
    document.getElementById('jump').ontouchstart = () => state.y -= 100;

    init();
</script>
</body>
</html>
