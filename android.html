<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON TERRA | Survival</title>
    <style>
        :root { --grass: #44aa44; --dirt: #5c3c2e; --stone: #444; --neon: #00f2ff; }
        body { margin: 0; background: #87ceeb; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Мир */
        #game-window { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; top: 0; left: 0; width: 5000px; height: 5000px; transition: 0.1s linear; }
        
        /* Плитки (Тайлы) */
        .tile { position: absolute; width: 50px; height: 50px; box-sizing: border-box; border: 0.1px solid rgba(0,0,0,0.1); }
        .tile.grass { background: var(--grass); border-top: 5px solid #2d7a2d; }
        .tile.dirt { background: var(--dirt); }
        .tile.stone { background: var(--stone); border: 2px solid #333; }
        .tile.wood { background: #8b4513; border: 2px solid #5d2e0d; border-radius: 3px; }
        .tile.iron { background: #aaa; box-shadow: inset 0 0 10px #fff; }

        /* Игрок */
        #player { 
            width: 30px; height: 45px; background: var(--neon); position: absolute; 
            z-index: 100; border-radius: 4px; box-shadow: 0 0 15px var(--neon); 
        }

        /* Инвентарь и Крафт */
        #ui { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; z-index: 1000; font-size: 12px; }
        #craft-menu { position: fixed; top: 20%; left: 10%; width: 80%; background: #222; border: 2px solid var(--neon); padding: 15px; display: none; z-index: 2000; }

        /* Управление */
        #controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 3000; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(5px); }
        .btn:active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="game-window">
    <div id="world">
        <div id="player"></div>
        <div id="tiles-layer"></div>
    </div>

    <div id="ui">
        <b>ИНВЕНТАРЬ:</b><br>
        WOOD: <span id="inv-wood">0</span> | DIRT: <span id="inv-dirt">0</span> | IRON: <span id="inv-iron">0</span><br>
        <button onclick="toggleCraft()" style="margin-top:5px;">МОЛОТ (КРАФТ)</button>
    </div>

    <div id="craft-menu">
        <h3>КРАФТИНГ</h3>
        <p>Нужно: 10 Wood + 5 Iron</p>
        <button onclick="craftPickaxe()" style="padding:10px; width:100%;">СОЗДАТЬ СУПЕР-КИРКУ</button>
        <br><br>
        <button onclick="toggleCraft()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="controls">
    <div style="display:flex; gap:10px;">
        <div class="btn" id="btn-L">←</div>
        <div class="btn" id="btn-R">→</div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="btn" id="btn-DIG" style="border-color:orange">DIG</div>
        <div class="btn" id="btn-UP" style="border-color:var(--neon)">UP</div>
    </div>
</div>

<script>
    const cfg = { ts: 50, rows: 40, cols: 50 }; // Размер плитки и мира
    let state = {
        x: 200, y: 400, 
        vx: 0, vy: 0,
        inv: { wood: 0, dirt: 0, iron: 0 },
        pickPower: 0.1,
        isDigging: false
    };

    const world = document.getElementById('tiles-layer');
    const player = document.getElementById('player');
    let tiles = {};

    function init() {
        // Генерация ландшафта
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r < 8) type = ''; // Воздух
                else if(r === 8) type = 'grass';
                else if(r < 15) type = 'dirt';
                else type = 'stone';

                // Рандомные руды и деревья
                if(type === 'stone' && Math.random() > 0.9) type = 'iron';
                if(r === 7 && Math.random() > 0.85) type = 'wood'; // Деревья

                if(type) {
                    const t = document.createElement('div');
                    t.className = `tile ${type}`;
                    t.style.left = c * cfg.ts + 'px';
                    t.style.top = r * cfg.ts + 'px';
                    t.dataset.hp = (type === 'iron' ? 10 : 3);
                    t.id = `t-${r}-${c}`;
                    world.appendChild(t);
                    tiles[`${r}-${c}`] = { el: t, type: type, hp: parseFloat(t.dataset.hp) };
                }
            }
        }
        loop();
    }

    function loop() {
        // Гравитация и физика
        state.x += state.vx;
        state.y += state.vy;
        
        // Копание
        if(state.isDigging) {
            // Ищем плитку прямо под или перед игроком
            let r = Math.floor((state.y + 50) / cfg.ts);
            let c = Math.floor((state.x + 15) / cfg.ts);
            let key = `${r}-${c}`;
            if(tiles[key]) {
                tiles[key].hp -= state.pickPower;
                tiles[key].el.style.opacity = tiles[key].hp / 3;
                if(tiles[key].hp <= 0) {
                    state.inv[tiles[key].type === 'wood' ? 'wood' : (tiles[key].type === 'iron' ? 'iron' : 'dirt')]++;
                    tiles[key].el.remove();
                    delete tiles[key];
                    updateUI();
                }
            }
        }

        // Рендер игрока и камеры
        player.style.left = state.x + 'px';
        player.style.top = state.y + 'px';
        document.getElementById('world').style.transform = `translate(${-state.x + 150}px, ${-state.y + 300}px)`;
        
        requestAnimationFrame(loop);
    }

    function updateUI() {
        document.getElementById('inv-wood').innerText = state.inv.wood;
        document.getElementById('inv-dirt').innerText = state.inv.dirt;
        document.getElementById('inv-iron').innerText = state.inv.iron;
    }

    function toggleCraft() {
        const m = document.getElementById('craft-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function craftPickaxe() {
        if(state.inv.wood >= 10 && state.inv.iron >= 5) {
            state.inv.wood -= 10; state.inv.iron -= 5;
            state.pickPower = 0.5; // Мощность копания выросла в 5 раз!
            alert("СУПЕР-КИРКА СОЗДАНА!");
            updateUI(); toggleCraft();
        } else { alert("Недостаточно ресурсов!"); }
    }

    // Управление зажимами
    const bind = (id, start, stop) => {
        const btn = document.getElementById(id);
        btn.ontouchstart = (e) => { e.preventDefault(); start(); };
        btn.ontouchend = (e) => { e.preventDefault(); stop(); };
    };

    bind('btn-L', () => state.vx = -6, () => state.vx = 0);
    bind('btn-R', () => state.vx = 6, () => state.vx = 0);
    bind('btn-DIG', () => state.isDigging = true, () => state.isDigging = false);
    document.getElementById('btn-UP').ontouchstart = () => { state.y -= 60; }; // Простой прыжок/взлет

    init();
</script>
</body>
</html>
