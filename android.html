<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SAGA: FINAL WORLD</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --wood: #8b4513; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 20000px; height: 20000px; }
        #sky { position: fixed; inset: 0; background: linear-gradient(to bottom, #000 0%, #001 20%, #4a90e2 50%, #87ceeb 100%); z-index: -1; }

        /* Плитки */
        .tile { position: absolute; width: 60px; height: 60px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.2); }
        .t-grass { background: linear-gradient(#4caf50, #2e7d32); }
        .t-dirt { background: linear-gradient(#5d4037, #3e2723); }
        .t-stone { background: linear-gradient(#424242, #111); }
        .t-iron { background: radial-gradient(circle, #ddd, #444); border: 2px solid #888; }
        .t-gold { background: radial-gradient(circle, #fff, #aa0); box-shadow: 0 0 15px #ff0; }
        .t-ladder { background: rgba(0,242,255,0.3); border-left: 8px solid var(--neon); border-right: 8px solid var(--neon); z-index: 5; }
        .t-bench { background: #ff9800; border: 4px solid #fff; box-shadow: 0 0 20px #f90; z-index: 10; animation: pulse 1s infinite; }

        /* Персонаж */
        #player { width: 34px; height: 52px; background: var(--neon); position: absolute; z-index: 1000; border-radius: 6px; box-shadow: 0 0 25px var(--neon); display: flex; flex-direction: column; align-items: center; }
        .eyes { display: flex; gap: 6px; margin-top: 10px; }
        .eye { width: 6px; height: 6px; background: #000; border-radius: 50%; }

        /* Боссы */
        .boss { position: absolute; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 10px solid #fff; border-radius: 20px; font-size: 24px; color: white; text-shadow: 2px 2px #000; }
        #b-up { width: 400px; height: 120px; background: #fff; color: #000; left: 2000px; top: -1500px; box-shadow: 0 0 100px #fff; }
        #b-down { width: 300px; height: 300px; background: #900; left: 2000px; top: 10000px; box-shadow: 0 0 100px red; }
        #b-left { width: 250px; height: 250px; background: #009; left: -1000px; top: 1800px; box-shadow: 0 0 100px blue; }
        #b-right { width: 250px; height: 250px; background: #090; left: 8000px; top: 1800px; box-shadow: 0 0 100px green; }

        /* Интерфейс */
        #hud { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid var(--neon); border-radius: 12px; z-index: 2000; }
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid var(--neon); padding: 25px; display: none; z-index: 5000; border-radius: 20px; text-align: center; width: 80%; }
        .menu-btn { width: 100%; padding: 15px; margin: 8px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; border-radius: 10px; font-size: 16px; }

        /* Кнопки */
        #controls { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-around; z-index: 4500; }
        .joy { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    </style>
</head>
<body>

<div id="viewport">
    <div id="sky"></div>
    <div id="world">
        <div id="player" style="left: 2000px; top: 1500px;"><div class="eyes"><div class="eye"></div><div class="eye"></div></div></div>
        <div id="b-up" class="boss">COSMOS DRAGON</div>
        <div id="b-down" class="boss">VOID WARDEN</div>
        <div id="b-left" class="boss">CYBER DRONE</div>
        <div id="b-right" class="boss">FOREST TITAN</div>
        <div id="tiles"></div>
    </div>

    <div id="hud">
        <b id="ui-res">W: 0 | I: 0 | G: 0</b><br>
        <span id="ui-alt" style="color:var(--gold)">ALT: 0m</span>
    </div>

    <div id="craft-ui" class="window">
        <h2 id="t-craft" style="color:orange">ВЕРСТАК</h2>
        <button class="menu-btn" onclick="craft('lad')" id="btn-lad">Лестница (3 Wood)</button>
        <button class="menu-btn" onclick="craft('pick')" id="btn-pick">Бур (15 Iron)</button>
        <button class="menu-btn" onclick="closeW()" id="btn-close">ЗАКРЫТЬ</button>
    </div>

    <div id="pause-ui" class="window">
        <h1 id="t-pause">ПАУЗА</h1>
        <button class="menu-btn" onclick="toggleP()" id="btn-res">ИГРАТЬ</button>
        <button class="menu-btn" onclick="changeL()" id="btn-lang">ЯЗЫК: RU</button>
        <button class="menu-btn" onclick="exportS()" style="color:lightgreen">СОХРАНИТЬ В ФАЙЛ</button>
        <button class="menu-btn" onclick="importS()" style="color:lightblue">ЗАГРУЗИТЬ ФАЙЛ</button>
        <button class="menu-btn" onclick="location.reload()" style="color:red">RESTART</button>
    </div>

    <div onclick="toggleP()" style="position:fixed; top:15px; right:15px; padding:10px; background:#000; border:2px solid var(--neon); z-index:6000; border-radius:8px;">MENU</div>
</div>

<div id="controls">
    <div class="joy" id="l">←</div>
    <div class="joy" id="r">→</div>
    <div class="joy" id="d" style="border-color:orange">DIG</div>
    <div class="joy" id="b" style="border-color:lightgreen">BUILD</div>
    <div class="joy" id="u" style="border-color:var(--neon)">UP</div>
</div>

<script>
    const cfg = { tw: 60, rows: 300, cols: 300, f: 0.85, a: 1.5, g: 0.8, j: -16 };
    let state = {
        x: 2000, y: 1500, vx: 0, vy: 0,
        inv: { wood: 0, iron: 0, gold: 0, lad: 0, dirt: 0 },
        isP: false, isDig: false, lang: 'ru', pwr: 0.18
    };

    const str = {
        ru: { lang: "ЯЗЫК: RU", alt: "ВЫСОТА", p: "ПАУЗА", res: "ИГРАТЬ", cr: "ВЕРСТАК", cl: "ЗАКРЫТЬ", lad: "Лестница (3 Дер)", pick: "Бур (15 Жел)" },
        en: { lang: "LANG: EN", alt: "ALTITUDE", p: "PAUSE", res: "RESUME", cr: "WORKBENCH", cl: "CLOSE", lad: "Ladder (3 Wood)", pick: "Drill (15 Iron)" }
    };

    let worldMap = {};
    const tilesCont = document.getElementById('tiles');

    function init() {
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r === 30) type = 'grass';
                else if(r > 30 && r < 150) type = 'dirt';
                else if(r >= 150) type = 'stone';
                if(r > 35 && Math.random() > 0.94) type = 'iron';
                if(r > 90 && Math.random() > 0.96) type = 'gold';
                if(r === 29 && Math.random() > 0.88) type = 'wood';
                if(type) addTile(r, c, type);
            }
        }
        addTile(29, 36, 'bench');
        updateUI();
        requestAnimationFrame(loop);
    }

    function addTile(r, c, type) {
        if(worldMap[`${r}-${c}`]) return;
        const t = document.createElement('div');
        t.className = `tile t-${type}`;
        t.style.left = c * cfg.tw + 'px';
        t.style.top = r * cfg.tw + 'px';
        if(type==='bench') t.innerHTML = "<center style='color:black;font-size:10px;font-weight:bold;margin-top:20px'>CRAFT</center>";
        tilesCont.appendChild(t);
        worldMap[`${r}-${c}`] = { el: t, type, hp: type==='stone'?15:5 };
    }

    function checkC(nx, ny) {
        let r = Math.floor((ny + 32) / cfg.tw);
        let c = Math.floor((nx + 17) / cfg.tw);
        let b = worldMap[`${r}-${c}`];
        return (b && b.type !== 'ladder' && b.type !== 'bench');
    }

    function loop() {
        if(!state.isP) {
            if(mv.l) { state.vx -= cfg.a; state.dir = -1; }
            if(mv.r) { state.vx += cfg.a; state.dir = 1; }
            state.vx *= cfg.f;
            state.vy += cfg.g;

            let r = Math.floor((state.y + 32) / cfg.tw);
            let c = Math.floor((state.x + 17) / cfg.tw);
            if(worldMap[`${r}-${c}`]?.type === 'ladder') state.vy = mv.u ? -10 : 1;

            if(!checkC(state.x + state.vx, state.y)) state.x += state.vx; else state.vx = 0;
            if(!checkC(state.x, state.y + state.vy)) state.y += state.vy; 
            else { if(state.vy > 0) canJ = true; state.vy = 0; }

            if(state.isDig) {
                let dr = Math.floor((state.y + 65) / cfg.tw);
                let dc = Math.floor((state.x + 17) / cfg.tw);
                let k = `${dr}-${dc}`;
                if(worldMap[k] && worldMap[k].type !== 'bench') {
                    worldMap[k].hp -= state.pwr;
                    worldMap[k].el.style.opacity = worldMap[k].hp / 5;
                    if(worldMap[k].hp <= 0) {
                        let t = worldMap[k].type;
                        if(t==='wood') state.inv.wood++; else if(t==='iron') state.inv.iron++; else if(t==='gold') state.inv.gold++; else state.inv.dirt++;
                        worldMap[k].el.remove(); delete worldMap[k];
                        updateUI();
                    }
                }
            }
            if(worldMap[`${r}-${c+1}`]?.type === 'bench' || worldMap[`${r}-${c-1}`]?.type === 'bench') document.getElementById('craft-ui').style.display = 'block';
        }
        document.getElementById('player').style.left = state.x + 'px';
        document.getElementById('player').style.top = state.y + 'px';
        document.getElementById('world').style.transform = `translate(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px)`;
        document.getElementById('ui-alt').innerText = `${str[state.lang].alt}: ${Math.floor((1800 - state.y)/10)}m`;
        document.getElementById('sky').style.opacity = Math.max(0, 1 - (1800 - state.y) / 3000);
        requestAnimationFrame(loop);
    }

    let mv = { l: false, r: false, u: false }, canJ = false;
    function craft(t) {
        if(t==='lad' && state.inv.wood >= 3) { state.inv.wood -= 3; state.inv.lad++; }
        if(t==='pick' && state.inv.iron >= 15) { state.inv.iron -= 15; state.pwr = 0.8; }
        updateUI();
    }

    function build() {
        let r = Math.floor((state.y + 32) / cfg.tw);
        let c = Math.floor((state.x + 17) / cfg.tw);
        if(state.inv.lad > 0 && !worldMap[`${r}-${c}`]) { addTile(r, c, 'ladder'); state.inv.lad--; }
        else if(state.inv.dirt > 0) { addTile(r+1, c, 'dirt'); state.inv.dirt--; }
        updateUI();
    }

    function updateUI() {
        let s = str[state.lang];
        document.getElementById('ui-res').innerText = `W: ${state.inv.wood} | I: ${state.inv.iron} | G: ${state.inv.gold} | L: ${state.inv.lad}`;
        document.getElementById('t-pause').innerText = s.p;
        document.getElementById('btn-res').innerText = s.res;
        document.getElementById('btn-lang').innerText = s.lang;
        document.getElementById('t-craft').innerText = s.cr;
        document.getElementById('btn-close').innerText = s.cl;
        document.getElementById('btn-lad').innerText = s.lad;
        document.getElementById('btn-pick').innerText = s.pick;
    }

    function exportS() {
        const d = btoa(JSON.stringify(state));
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([d], {type:"text/plain"}));
        a.download = "neon_saga_save.json"; a.click();
    }

    function importS() {
        const i = document.createElement("input"); i.type = "file";
        i.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = () => { state = JSON.parse(atob(r.result)); location.reload(); };
        }; i.click();
    }

    function toggleP() { state.isP = !state.isP; document.getElementById('pause-ui').style.display = state.isP ? 'flex' : 'none'; }
    function closeW() { document.getElementById('craft-ui').style.display = 'none'; }
    function changeL() { state.lang = state.lang === 'ru' ? 'en' : 'ru'; updateUI(); }

    const bnd = (id, k) => {
        let el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); mv[k] = true; };
        el.ontouchend = (e) => { e.preventDefault(); mv[k] = false; };
    };
    bnd('l', 'l'); bnd('r', 'r');
    document.getElementById('u').ontouchstart = () => { if(canJ) { state.vy = cfg.j; canJ = false; } };
    document.getElementById('d').ontouchstart = () => state.isDig = true;
    document.getElementById('d').ontouchend = () => state.isDig = false;
    document.getElementById('b').ontouchstart = build;

    init();
</script>
</body>
</html>
