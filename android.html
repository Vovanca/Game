<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUESTIFY: MEGA SAGA</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --hp: #ff3333; --wood: #8b4513; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 20000px; height: 20000px; }
        
        /* Плитки с улучшенными текстурами */
        .tile { position: absolute; width: 64px; height: 64px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.3); }
        .t-grass { background: linear-gradient(#4caf50, #1b5e20); box-shadow: inset 0 5px 10px rgba(255,255,255,0.3); }
        .t-dirt { background: linear-gradient(#5d4037, #2d1b0d); }
        .t-stone { background: linear-gradient(#424242, #111); border: 2px solid #222; }
        .t-iron { background: radial-gradient(circle, #ccc, #444); border: 3px solid #888; }
        .t-gold { background: radial-gradient(circle, #fff, #aa0); box-shadow: 0 0 20px #ff0; }
        .t-ladder { background: repeating-linear-gradient(0deg, #5d2e0d, #5d2e0d 8px, transparent 8px, transparent 16px); border-left: 10px solid #3e2723; border-right: 10px solid #3e2723; }
        .t-bench { background: #ff9800; border: 4px solid #fff; box-shadow: 0 0 25px #f90; animation: glow 1.5s infinite; }

        /* Персонаж с плавной анимацией */
        #player { 
            width: 32px; height: 50px; background: var(--neon); position: absolute; 
            z-index: 1000; border-radius: 6px; box-shadow: 0 0 30px var(--neon);
            transition: transform 0.1s; /* Маленький наклон при беге */
        }
        #light { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%); transform: translate(-284px, -275px); pointer-events: none; }

        /* Боссы */
        .boss { position: absolute; border-radius: 20px; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: white; border: 5px solid white; }
        #boss-down { width: 200px; height: 200px; background: #900; box-shadow: 0 0 60px #f00; }
        #boss-right { width: 180px; height: 250px; background: #060; box-shadow: 0 0 60px #0f0; }
        #boss-left { width: 150px; height: 150px; background: #009; box-shadow: 0 0 60px #00f; }

        /* Интерфейс */
        #hud { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid var(--neon); z-index: 2000; border-radius: 15px; min-width: 200px; }
        #hp-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin: 8px 0; }
        #hp-fill { height: 100%; background: var(--hp); width: 100%; transition: 0.4s cubic-bezier(0.1, 0.5, 0.1, 1); }

        /* Окна */
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #05050a; border: 3px solid var(--neon); padding: 25px; display: none; z-index: 5000; border-radius: 25px; text-align: center; width: 85%; max-height: 80vh; overflow-y: auto; }
        .menu-btn { width: 100%; padding: 16px; margin: 6px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; border-radius: 12px; font-size: 15px; }

        /* Кнопки Android */
        #controls { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-around; z-index: 4500; }
        .joy { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(10px); }

        @keyframes glow { 0% { box-shadow: 0 0 10px #f90; } 50% { box-shadow: 0 0 30px #f90; } 100% { box-shadow: 0 0 10px #f90; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="world">
        <div id="player" style="left: 2000px; top: 1800px;"><div id="light"></div></div>
        
        <!-- Локации Боссов -->
        <div id="boss-down" class="boss" style="left: 2000px; top: 6000px;">СТРАЖ БЕЗДНЫ</div>
        <div id="boss-right" class="boss" style="left: 8000px; top: 1800px;">ЛЕСНОЙ ТИТАН</div>
        <div id="boss-left" class="boss" style="left: 100px; top: 1800px;">КИБЕР-ДРОН</div>
        
        <div id="tiles"></div>
    </div>

    <!-- UI -->
    <div id="hud">
        <b id="ui-status" style="color:var(--neon)">ВЫЖИВШИЙ</b>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <span id="ui-res">ДЕРЕВО: 0 | ЖЕЛЕЗО: 0 | ЗОЛОТО: 0</span><br>
        <span id="ui-quest" style="color:var(--gold)">Квест: Найди верстак</span>
    </div>

    <!-- Меню Крафта -->
    <div id="craft-ui" class="window" style="border-color: orange;">
        <h2 id="txt-craft-title" style="color:orange">ВЕРСТАК</h2>
        <div id="craft-list"></div>
        <button class="menu-btn" onclick="closeW('craft-ui')" style="border-color:red; color:red;">ЗАКРЫТЬ</button>
    </div>

    <!-- Пауза -->
    <div id="pause-ui" class="window">
        <h1 id="txt-pause-title">ПАУЗА</h1>
        <button class="menu-btn" onclick="toggleP()" id="btn-resume">ИГРАТЬ</button>
        <button class="menu-btn" onclick="changeL()" id="btn-lang">ЯЗЫК: RU</button>
        <button class="menu-btn" onclick="exportSave()" style="color:lightgreen;">СОХРАНИТЬ В ФАЙЛ</button>
        <button class="menu-btn" onclick="location.reload()" style="color:red;">ПЕРЕЗАГРУЗКА</button>
    </div>

    <div onclick="toggleP()" style="position:fixed; top:15px; right:15px; padding:12px; background:#000; border:2px solid var(--neon); z-index:6000; border-radius:12px;">МЕНЮ</div>
</div>

<div id="controls">
    <div class="joy" id="l">←</div>
    <div class="joy" id="r">→</div>
    <div class="joy" id="d" style="border-color:orange">DIG</div>
    <div class="joy" id="b" style="border-color:lightgreen">BUILD</div>
    <div class="joy" id="u" style="border-color:var(--neon)">UP</div>
</div>

<script>
    const cfg = { tw: 64, rows: 200, cols: 200 };
    let state = {
        x: 2000, y: 1800, vx: 0, vy: 0, hp: 100,
        inv: { wood: 0, iron: 0, gold: 0, lad: 0, dirt: 0 },
        lang: 'ru', isP: false, isDig: false, pwr: 0.15, q: 0
    };

    const str = {
        ru: { p: "ПАУЗА", q0: "Найди оранжевый верстак", q1: "Исследуй карту: Боссы ждут", w: "Дерево", i: "Железо", g: "Золото", craft: "ВЕРСТАК", resume: "ИГРАТЬ", lang: "ЯЗЫК: RU", pick: "Кирка улучшена!", lad: "Лестница" },
        en: { p: "PAUSE", q0: "Find orange workbench", q1: "Explore map: Bosses await", w: "Wood", i: "Iron", g: "Gold", craft: "WORKBENCH", resume: "RESUME", lang: "LANG: EN", pick: "Pickaxe upgraded!", lad: "Ladder" }
    };

    let worldMap = {};
    const tilesCont = document.getElementById('tiles');

    function init() {
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r === 30) type = 'grass';
                else if(r > 30 && r < 60) type = 'dirt';
                else if(r >= 60) type = 'stone';
                
                if(r > 35 && Math.random() > 0.94) type = 'iron';
                if(r > 80 && Math.random() > 0.96) type = 'gold';
                if(r === 29 && Math.random() > 0.9) type = 'wood';

                if(type) addTile(r, c, type);
            }
        }
        addTile(29, 35, 'bench');
        updateUI();
        loop();
    }

    function addTile(r, c, type) {
        if(worldMap[`${r}-${c}`]) return;
        const t = document.createElement('div');
        t.className = `tile t-${type}`;
        t.style.left = c * cfg.tw + 'px';
        t.style.top = r * cfg.tw + 'px';
        if(type === 'bench') t.innerHTML = "<center>CRAFT</center>";
        tilesCont.appendChild(t);
        worldMap[`${r}-${c}`] = { el: t, type, hp: type==='stone'?10:4 };
    }

    function checkCol(nx, ny) {
        let r = Math.floor((ny + 25) / cfg.tw);
        let c = Math.floor((nx + 16) / cfg.tw);
        let b = worldMap[`${r}-${c}`];
        return (b && b.type !== 'ladder' && b.type !== 'bench');
    }

    function loop() {
        if(!state.isP) {
            // Плавная физика
            state.vy += 0.8; // Гравитация
            if(state.vy > 15) state.vy = 15;

            let r = Math.floor((state.y + 30) / cfg.tw);
            let c = Math.floor((state.x + 16) / cfg.tw);
            
            // Лестница
            if(worldMap[`${r}-${c}`]?.type === 'ladder') {
                state.vy = state.vy > 0 ? 2 : state.vy; 
                if(state.isDig) state.vy = -5; // Подъем по лестнице
            }

            // Горизонтальное движение с инерцией
            if(!checkCol(state.x + state.vx, state.y)) state.x += state.vx;
            // Вертикальное движение
            if(!checkCol(state.x, state.y + state.vy)) state.y += state.vy; 
            else { if(state.vy > 0) state.vy = 0; }

            // Копание
            if(state.isDig) {
                let dr = Math.floor((state.y + 65) / cfg.tw);
                let dc = Math.floor((state.x + 16) / cfg.tw);
                let k = `${dr}-${dc}`;
                if(worldMap[k] && worldMap[k].type !== 'bench') {
                    worldMap[k].hp -= state.pwr;
                    worldMap[k].el.style.filter = `brightness(${worldMap[k].hp/4 + 0.5})`;
                    if(worldMap[k].hp <= 0) {
                        let t = worldMap[k].type;
                        if(t === 'wood') state.inv.wood++; 
                        else if(t === 'iron') state.inv.iron++;
                        else if(t === 'gold') state.inv.gold++;
                        else state.inv.dirt++;
                        worldMap[k].el.remove(); delete worldMap[k];
                        updateUI();
                    }
                }
            }
            
            // Проверка верстака
            if(worldMap[`${r}-${c+1}`]?.type === 'bench' || worldMap[`${r}-${c-1}`]?.type === 'bench') {
                openCraft();
            } else { closeW('craft-ui'); }

            // Показ боссов при приближении
            if(state.y > 5500) document.getElementById('boss-down').style.display = 'flex';
            if(state.x > 7500) document.getElementById('boss-right').style.display = 'flex';
            if(state.x < 500) document.getElementById('boss-left').style.display = 'flex';
        }

        const pEl = document.getElementById('player');
        pEl.style.left = state.x + 'px';
        pEl.style.top = state.y + 'px';
        // Наклон при беге
        pEl.style.transform = `skewX(${state.vx * 2}deg)`;
        
        document.getElementById('world').style.transform = `translate(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px)`;
        requestAnimationFrame(loop);
    }

    function openCraft() {
        const ui = document.getElementById('craft-ui');
        if(ui.style.display === 'block') return;
        ui.style.display = 'block';
        state.q = 1; updateUI();
        const list = document.getElementById('craft-list');
        let s = str[state.lang];
        list.innerHTML = `
            <button class="menu-btn" onclick="craft('lad')">${s.lad} (3 ${s.w})</button>
            <button class="menu-btn" onclick="craft('pick')">${s.pick} (15 ${s.i})</button>
            <button class="menu-btn" onclick="craft('dynamite')">Dynamite (10 ${s.g})</button>
        `;
    }

    function craft(type) {
        if(type === 'lad' && state.inv.wood >= 3) { state.inv.wood -= 3; state.inv.lad++; }
        else if(type === 'pick' && state.inv.iron >= 15) { state.inv.iron -= 15; state.pwr = 0.5; }
        updateUI();
    }

    function changeL() {
        state.lang = state.lang === 'ru' ? 'en' : 'ru';
        updateUI();
    }

    function updateUI() {
        let s = str[state.lang];
        document.getElementById('ui-res').innerText = `${s.w.toUpperCase()}: ${state.inv.wood} | ${s.i.toUpperCase()}: ${state.inv.iron} | ${s.g.toUpperCase()}: ${state.inv.gold}`;
        document.getElementById('ui-quest').innerText = `Квест: ${state.q === 0 ? s.q0 : s.q1}`;
        document.getElementById('txt-pause-title').innerText = s.p;
        document.getElementById('txt-craft-title').innerText = s.craft;
        document.getElementById('btn-resume').innerText = s.resume;
        document.getElementById('btn-lang').innerText = s.lang;
    }

    function toggleP() { state.isP = !state.isP; document.getElementById('pause-ui').style.display = state.isP ? 'flex' : 'none'; }
    function closeW(id) { document.getElementById(id).style.display = 'none'; }

    const bind = (id, s, e) => {
        let el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };
    bind('l', () => state.vx = -8, () => state.vx = 0);
    bind('r', () => state.vx = 8, () => state.vx = 0);
    bind('d', () => state.isDig = true, () => state.isDig = false);
    document.getElementById('u').ontouchstart = () => { if(state.vy === 0) state.vy = -16; };
    document.getElementById('b').ontouchstart = () => {
        let r = Math.floor((state.y + 30) / cfg.tw);
        let c = Math.floor((state.x + 16) / cfg.tw);
        if(state.inv.lad > 0) { addTile(r, c, 'ladder'); state.inv.lad--; updateUI(); }
        else if(state.inv.dirt > 0) { addTile(r+1, c, 'dirt'); state.inv.dirt--; updateUI(); }
    };

    init();
</script>
</body>
</html>
