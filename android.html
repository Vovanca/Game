<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON ODYSSEY | Mobile</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --wall: #333344; }
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* Сцена */
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #camera { position: absolute; transition: transform 0.1s linear; width: 10000px; height: 100%; 
            background: linear-gradient(180deg, #050510 0%, #101020 100%); }

        /* Игрок */
        #player { 
            width: 32px; height: 48px; background: var(--neon); position: absolute; 
            bottom: 100px; left: 100px; border-radius: 4px; box-shadow: 0 0 20px var(--neon); 
            z-index: 100;
        }
        #player::after { content: ''; position: absolute; top: 10px; right: -5px; width: 10px; height: 10px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; }

        /* Мир: Блоки и Ресурсы */
        .ore { position: absolute; width: 60px; height: 60px; background: var(--wall); border: 2px solid #555; 
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .ore.iron { background: #777; border-color: #aaa; color: #fff; }
        .ore.gold { background: #554400; border-color: var(--gold); color: var(--gold); }
        
        /* NPC */
        .npc { position: absolute; width: 35px; height: 50px; background: #ff00ff; bottom: 100px; border-radius: 4px; box-shadow: 0 0 15px #ff00ff; }
        .bubble { position: absolute; top: -40px; left: -20px; background: white; color: black; padding: 5px; border-radius: 5px; font-size: 12px; display: none; }

        /* UI Диалоги */
        #ui-dialog { 
            position: fixed; top: 20%; left: 10%; width: 80%; background: rgba(0,0,0,0.95); 
            border: 2px solid var(--neon); padding: 20px; border-radius: 15px; display: none; z-index: 1000;
        }
        .choice-btn { display: block; width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid var(--neon); color: white; border-radius: 5px; }

        /* Управление (Крупные кнопки) */
        #controls { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 2000; }
        .btn-box { display: flex; gap: 15px; }
        .ctrl-btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;
            -webkit-user-select: none; backdrop-filter: blur(5px);
        }
        .ctrl-btn:active { background: var(--neon); color: black; border-color: white; transform: scale(1.1); }

        /* Меню Паузы */
        #pause-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        
        .progress-bar { width: 200px; height: 10px; background: #222; border: 1px solid #444; margin: 10px 0; position: relative; }
        #hp-fill { height: 100%; background: #ff3344; width: 100%; transition: 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="camera">
        <div id="player"></div>
        <div id="objects-layer"></div>
        <!-- Земля -->
        <div style="position:absolute; bottom:0; width:10000px; height:100px; background:#111; border-top:4px solid #222;"></div>
    </div>

    <!-- Индикаторы -->
    <div style="position:fixed; top:15px; left:15px; z-index:500;">
        <div id="lang-label">RU</div>
        <div class="progress-bar"><div id="hp-fill"></div></div>
        <div style="font-size:12px;">IRON: <span id="count-iron">0</span> | GOLD: <span id="count-gold">0</span></div>
    </div>

    <div id="ui-dialog">
        <h3 id="dialog-name">NPC</h3>
        <p id="dialog-text">Text...</p>
        <div id="choices"></div>
    </div>

    <div id="pause-overlay">
        <h1 id="txt-pause">ПАУЗА</h1>
        <button class="choice-btn" onclick="setLanguage('ru')">Русский</button>
        <button class="choice-btn" onclick="setLanguage('en')">English</button>
        <button class="choice-btn" onclick="togglePause()" style="background:var(--neon); color:black;">RESUME</button>
        <button class="choice-btn" onclick="exportSave()">SAVE TO FILE</button>
    </div>

    <div onclick="togglePause()" style="position:fixed; top:15px; right:15px; padding:10px; background:#222; border-radius:5px; z-index:1000;">MENU</div>
</div>

<div id="controls">
    <div class="btn-box">
        <div class="ctrl-btn" id="btn-left">←</div>
        <div class="ctrl-btn" id="btn-right">→</div>
    </div>
    <div class="btn-box">
        <div class="ctrl-btn" id="btn-hit" style="border-color:orange">HIT</div>
        <div class="ctrl-btn" id="btn-jump" style="border-color:var(--neon)">UP</div>
    </div>
</div>

<script>
    const state = {
        lang: 'ru',
        x: 100, y: 100, hp: 100,
        iron: 0, gold: 0,
        isPaused: false,
        moving: 0, // -1 влево, 1 вправо
        mining: false
    };

    const strings = {
        ru: { pause: "ПАУЗА", talk: "Нажми UP чтобы говорить", greet: "Привет, путник. Эта шахта полна золота, но берегись глубины.", choice1: "Кто ты?", choice2: "Как копать?" },
        en: { pause: "PAUSE", talk: "Press UP to talk", greet: "Greetings, traveler. This mine is rich, but beware of the deep.", choice1: "Who are you?", choice2: "How to mine?" }
    };

    function init() {
        const world = document.getElementById('objects-layer');
        // Генерируем блоки руды
        for(let i=0; i<30; i++) {
            let ore = document.createElement('div');
            let type = Math.random() > 0.8 ? 'gold' : 'iron';
            ore.className = `ore ${type}`;
            ore.style.left = (400 + i * 250) + 'px';
            ore.style.bottom = (100 + Math.random() * 150) + 'px';
            ore.dataset.hp = (type === 'gold' ? 5 : 3);
            ore.id = 'ore-' + i;
            ore.innerHTML = type.toUpperCase();
            world.appendChild(ore);
        }
        // NPC
        let npc = document.createElement('div');
        npc.className = 'npc';
        npc.style.left = '300px';
        world.appendChild(npc);
        
        gameLoop();
    }

    function gameLoop() {
        if(!state.isPaused) {
            // Движение
            if(state.moving !== 0) {
                state.x += state.moving * 5;
                if(state.x < 0) state.x = 0;
                document.getElementById('player').style.left = state.x + 'px';
                document.getElementById('camera').style.transform = `translateX(${-state.x + 100}px)`;
            }

            // Майнинг (если зажата кнопка HIT)
            if(state.mining) {
                const ores = document.querySelectorAll('.ore');
                ores.forEach(ore => {
                    let dist = Math.abs(state.x - parseInt(ore.style.left));
                    if(dist < 50) {
                        let hp = parseFloat(ore.dataset.hp) - 0.05;
                        ore.dataset.hp = hp;
                        ore.style.opacity = hp/3;
                        if(hp <= 0) {
                            if(ore.classList.contains('gold')) state.gold++;
                            else state.iron++;
                            ore.remove();
                            updateUI();
                        }
                    }
                });
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        document.getElementById('count-iron').innerText = state.iron;
        document.getElementById('count-gold').innerText = state.gold;
        document.getElementById('hp-fill').style.width = state.hp + '%';
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        document.getElementById('pause-overlay').style.display = state.isPaused ? 'flex' : 'none';
    }

    function setLanguage(l) {
        state.lang = l;
        document.getElementById('txt-pause').innerText = strings[l].pause;
        document.getElementById('lang-label').innerText = l.toUpperCase();
    }

    function openDialog() {
        // Проверка близости к NPC (на 300px)
        if(Math.abs(state.x - 300) < 60) {
            const d = document.getElementById('ui-dialog');
            const c = document.getElementById('choices');
            d.style.display = 'block';
            document.getElementById('dialog-name').innerText = "BILLY";
            document.getElementById('dialog-text').innerText = strings[state.lang].greet;
            c.innerHTML = `
                <button class="choice-btn" onclick="closeDialog()">${strings[state.lang].choice1}</button>
                <button class="choice-btn" onclick="closeDialog()">${strings[state.lang].choice2}</button>
            `;
        } else {
            // Обычный прыжок если NPC далеко
            let p = document.getElementById('player');
            p.style.bottom = '220px';
            setTimeout(() => p.style.bottom = '100px', 300);
        }
    }

    function closeDialog() { document.getElementById('ui-dialog').style.display = 'none'; }

    // --- Обработка зажатий для Android ---
    const bindBtn = (id, startAction, endAction) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); endAction(); });
        // Для ПК тестов
        el.addEventListener('mousedown', startAction);
        el.addEventListener('mouseup', endAction);
    };

    bindBtn('btn-left', () => state.moving = -1, () => state.moving = 0);
    bindBtn('btn-right', () => state.moving = 1, () => state.moving = 0);
    bindBtn('btn-hit', () => state.mining = true, () => state.mining = false);
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); openDialog(); });

    init();
</script>
</body>
</html>
