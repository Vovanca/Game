<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON SAGA: PC FIX EDITION</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --red: #ff4444; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; }
        #world { position: absolute; will-change: transform; top: 0; left: 0; }
        #sky { position: fixed; inset: 0; background: linear-gradient(to bottom, #001 0%, #4a90e2 50%, #87ceeb 100%); z-index: -1; }
        
        /* Блоки */
        .tile { position: absolute; width: 60px; height: 60px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.2); }
        .t-grass { background: linear-gradient(#4caf50, #2e7d32); }
        .t-dirt { background: linear-gradient(#5d4037, #3e2723); }
        .t-stone { background: linear-gradient(#424242, #111); }
        .t-iron { background: radial-gradient(circle, #ddd, #555); border: 2px solid #888; }
        .t-gold { background: radial-gradient(circle, #fff, #aa0); box-shadow: 0 0 20px #ff0; }
        .t-ladder { background: rgba(0,242,255,0.3); border-left: 8px solid var(--neon); border-right: 8px solid var(--neon); }
        .t-bench { background: #ff9800; border: 4px solid #fff; box-shadow: 0 0 20px #f90; z-index: 10; text-align: center; line-height: 50px; font-weight: bold; color: #000; }

        /* Персонаж и NPC */
        #player { width: 34px; height: 52px; background: var(--neon); position: absolute; z-index: 1000; border-radius: 4px; box-shadow: 0 0 30px var(--neon); display: block !important; }
        .npc { width: 40px; height: 55px; background: #ff00ff; position: absolute; z-index: 900; border: 3px solid #fff; border-radius: 10px; }
        .boss { position: absolute; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 20px; border: 8px solid #fff; font-size: 24px; color: #fff; text-shadow: 2px 2px #000; }

        /* Интерфейс */
        #hud { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid var(--neon); border-radius: 12px; z-index: 2000; }
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid var(--neon); padding: 25px; display: none; z-index: 5000; border-radius: 20px; text-align: center; width: 400px; max-height: 80vh; overflow-y: auto; }
        .menu-btn { width: 100%; padding: 12px; margin: 6px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="sky"></div>
    <div id="world">
        <div id="player"></div> <!-- Персонаж здесь -->
        <div id="lesya" class="npc" style="left: 2300px; top: 1745px;"></div>
        <div id="tiles"></div>
        
        <!-- Боссы на месте -->
        <div class="boss" style="left:2100px; top:-1000px; width:400px; height:120px; background:white; color:black;">COSMOS DRAGON</div>
        <div class="boss" style="left:8000px; top:1800px; width:300px; height:300px; background:green;">FOREST TITAN</div>
        <div class="boss" style="left:-1000px; top:1800px; width:300px; height:300px; background:blue;">CYBER DROID</div>
        <div class="boss" style="left:2000px; top:10000px; width:400px; height:400px; background:red;">VOID WARDEN</div>
    </div>

    <div id="hud">
        <b id="ui-inv">ДЕРЕВО: 0 | ЖЕЛЕЗО: 0 | ЗОЛОТО: 0</b><br>
        <span id="ui-quest" style="color:var(--gold)">Квест: Поговори с Лесей (W)</span>
    </div>

    <!-- Окна (Верстак, Справка, Бинды) -->
    <div id="craft-ui" class="window">
        <h2 style="color:orange">ВЕРСТАК</h2>
        <button class="menu-btn" onclick="craft('lad')">Лестница (3 Wood)</button>
        <button class="menu-btn" onclick="craft('pick')">Бур (15 Iron)</button>
        <button class="menu-btn" onclick="closeW('craft-ui')">ЗАКРЫТЬ</button>
    </div>

    <div id="help-ui" class="window">
        <h2 style="color:var(--neon)">КАК ИГРАТЬ</h2>
        <p>Ходьба: WASD | Прыжок: SPACE<br>Копать: ЛКМ | Строить: R<br>Верстак: E</p>
        <button class="menu-btn" onclick="closeW('help-ui')">ПОНЯТНО</button>
    </div>

    <div id="bind-ui" class="window">
        <h2 style="color:var(--neon)">НАСТРОЙКА КЛАВИШ</h2>
        <div id="bind-list"></div>
        <button class="menu-btn" onclick="closeW('bind-ui')">НАЗАД</button>
    </div>

    <div id="pause-ui" class="window">
        <h1>ПАУЗА</h1>
        <button class="menu-btn" onclick="toggleP()">ИГРАТЬ</button>
        <button class="menu-btn" onclick="openW('help-ui')">ИНСТРУКЦИЯ</button>
        <button class="menu-btn" onclick="openW('bind-ui')">БИНДЫ</button>
        <button class="menu-btn" onclick="changeL()" id="btn-lang">ЯЗЫК: RU</button>
        <button class="menu-btn" onclick="exportS()" style="color:lightgreen">В ФАЙЛ</button>
        <button class="menu-btn" onclick="importS()" style="color:lightblue">ИЗ ФАЙЛА</button>
        <button class="menu-btn" onclick="location.reload()" style="color:red">RESTART</button>
    </div>

    <div onclick="toggleP()" style="position:fixed; top:15px; right:15px; padding:10px; background:#000; border:2px solid var(--neon); z-index:6000; cursor:pointer;">MENU</div>
</div>

<script>
    const cfg = { tw: 60, rows: 200, cols: 200, f: 0.85, a: 1.5, g: 0.8, j: -16 };
    let state = {
        x: 2100, y: 1650, vx: 0, vy: 0,
        inv: { wood: 0, iron: 0, gold: 0, lad: 0, dirt: 0 },
        lang: 'ru', isP: false, pwr: 0.22, q: 0,
        binds: { left: 'KeyA', right: 'KeyD', jump: 'Space', up: 'KeyW', build: 'KeyR', craft: 'KeyE' }
    };

    const str = {
        ru: { p: "ПАУЗА", q0: "Квест: Поговори с Лесей (W)", q1: "Квест: Собери 15 Железа", cr: "ВЕРСТАК", l: "ЯЗЫК: RU" },
        en: { p: "PAUSE", q0: "Quest: Talk to Lesya (W)", q1: "Quest: Find 15 Iron", cr: "WORKBENCH", l: "LANG: EN" }
    };

    let worldMap = {}, keys = {}, bindingAction = null, canJ = false;

    function init() {
        // Генерация мира
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r === 30) type = 'grass';
                else if(r > 30 && r < 120) type = 'dirt';
                else if(r >= 120) type = 'stone';
                if(r > 35 && Math.random() > 0.94) type = 'iron';
                if(r > 90 && Math.random() > 0.96) type = 'gold';
                if(r === 29 && Math.random() > 0.9) type = 'wood';
                if(type) addTile(r, c, type);
            }
        }
        addTile(29, 36, 'bench');
        
        // ПРИНУДИТЕЛЬНЫЙ СПАВН ПЕРСОНАЖА
        const p = document.getElementById('player');
        p.style.display = 'block';
        
        updateUI(); renderBinds();
        requestAnimationFrame(loop);
    }

    function addTile(r, c, type) {
        if(worldMap[`${r}-${c}`]) return;
        const t = document.createElement('div');
        t.className = `tile t-${type}`;
        t.style.left = c * cfg.tw + 'px'; t.style.top = r * cfg.tw + 'px';
        if(type==='bench') t.innerText = "WORK";
        document.getElementById('tiles').appendChild(t);
        worldMap[`${r}-${c}`] = { el: t, type, hp: 5 };
    }

    function loop() {
        if(!state.isP) {
            if(keys[state.binds.left]) state.vx -= cfg.a;
            if(keys[state.binds.right]) state.vx += cfg.a;
            if(keys[state.binds.jump] && canJ) { state.vy = cfg.j; canJ = false; }
            state.vx *= cfg.f; state.vy += cfg.g;

            let r = Math.floor((state.y + 32) / cfg.tw), c = Math.floor((state.x + 16) / cfg.tw);
            
            // Физика лестниц
            if(worldMap[`${r}-${c}`]?.type === 'ladder') state.vy = keys[state.binds.up] ? -10 : 1;

            // Коллизии
            if(!checkCol(state.x + state.vx, state.y)) state.x += state.vx; else state.vx = 0;
            if(!checkCol(state.x, state.y + state.vy)) state.y += state.vy; 
            else { if(state.vy > 0) canJ = true; state.vy = 0; }

            // Сюжет: Леся
            if(Math.abs(state.x - 2300) < 100 && keys[state.binds.up]) { state.q = 1; updateUI(); }
            // Верстак
            if(keys[state.binds.craft] && (worldMap[`${r}-${c+1}`]?.type === 'bench' || worldMap[`${r}-${c-1}`]?.type === 'bench')) { openW('craft-ui'); }
        }

        // Обновление позиции персонажа и камеры
        const p = document.getElementById('player');
        p.style.left = state.x + 'px'; p.style.top = state.y + 'px';
        document.getElementById('world').style.transform = `translate3d(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px, 0)`;
        
        requestAnimationFrame(loop);
    }

    function checkCol(nx, ny) {
        let r = Math.floor((ny + 32) / cfg.tw), c = Math.floor((nx + 16) / cfg.tw);
        let b = worldMap[`${r}-${c}`];
        return (b && b.type !== 'ladder' && b.type !== 'bench');
    }

    // Взаимодействие (ЛКМ)
    window.onmousedown = (e) => {
        if(state.isP) return;
        let rect = document.getElementById('world').getBoundingClientRect();
        let mx = e.clientX - rect.left, my = e.clientY - rect.top;
        let r = Math.floor(my / cfg.tw), c = Math.floor(mx / cfg.tw), k = `${r}-${c}`;
        if(worldMap[k] && worldMap[k].type !== 'bench' && Math.abs(state.x - mx) < 200) {
            worldMap[k].hp -= state.pwr;
            worldMap[k].el.style.opacity = worldMap[k].hp / 5;
            if(worldMap[k].hp <= 0) {
                let type = worldMap[k].type;
                if(type === 'wood') state.inv.wood++; 
                else if(type === 'iron') state.inv.iron++;
                else if(type === 'gold') state.inv.gold++;
                else state.inv.dirt++;
                worldMap[k].el.remove(); delete worldMap[k]; updateUI();
            }
        }
    };

    window.onkeydown = (e) => {
        if(bindingAction) { state.binds[bindingAction] = e.code; bindingAction = null; renderBinds(); return; }
        keys[e.code] = true; 
        if(e.code === 'Escape') toggleP();
        if(e.code === state.binds.build) build();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function renderBinds() {
        const list = document.getElementById('bind-list'); list.innerHTML = '';
        for(let action in state.binds) {
            let b = document.createElement('button'); b.className = 'menu-btn';
            b.innerText = `${action.toUpperCase()}: ${state.binds[action]}`;
            b.onclick = () => { bindingAction = action; b.innerText = "НАЖМИ КЛАВИШУ..."; };
            list.appendChild(b);
        }
    }

    function craft(t) {
        if(t==='lad' && state.inv.wood >= 3) { state.inv.wood -= 3; state.inv.lad++; }
        if(t==='pick' && state.inv.iron >= 15) { state.inv.iron -= 15; state.pwr = 0.8; }
        updateUI();
    }

    function build() {
        let r = Math.floor((state.y + 32) / cfg.tw), c = Math.floor((state.x + 16) / cfg.tw);
        if(state.inv.lad > 0) { addTile(r, c, 'ladder'); state.inv.lad--; }
        else if(state.inv.dirt > 0) { addTile(r+1, c, 'dirt'); state.inv.dirt--; }
        updateUI();
    }

    function updateUI() {
        let s = str[state.lang];
        document.getElementById('ui-inv').innerText = `ДЕРЕВО: ${state.inv.wood} | ЖЕЛЕЗО: ${state.inv.iron} | ЗОЛОТО: ${state.inv.gold}`;
        document.getElementById('ui-quest').innerText = state.q === 0 ? s.q0 : s.q1;
        document.getElementById('btn-lang').innerText = s.l;
    }

    function exportS() { const d = btoa(JSON.stringify(state)); const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([d], {type:"text/plain"})); a.download = "pc_save.json"; a.click(); }
    function importS() { const i = document.createElement("input"); i.type = "file"; i.onchange = e => { const r = new FileReader(); r.readAsText(e.target.files); r.onload = () => { state = JSON.parse(atob(r.result)); location.reload(); }; }; i.click(); }
    function toggleP() { state.isP = !state.isP; document.getElementById('pause-ui').style.display = state.isP ? 'flex' : 'none'; }
    function openW(id) { document.getElementById(id).style.display = 'block'; }
    function closeW(id) { document.getElementById(id).style.display = 'none'; }
    function changeL() { state.lang = state.lang === 'ru' ? 'en' : 'ru'; updateUI(); }
    
    init(); window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
