<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON SAGA: PC MEGA EDITION</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --red: #ff3333; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; cursor: none; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; will-change: transform; }
        
        /* Биомы */
        .biome-forest { background: linear-gradient(to bottom, #87ceeb, #2e7d32); }
        .biome-desert { background: linear-gradient(to bottom, #ffcc33, #e67e22); }
        .biome-ice { background: linear-gradient(to bottom, #a2d2ff, #2980b9); }

        /* Блоки */
        .tile { position: absolute; width: 60px; height: 60px; border: 1px solid rgba(0,0,0,0.2); }
        .t-grass { background: #4caf50; } .t-sand { background: #f1c40f; } .t-snow { background: #ecf0f1; }
        .t-stone { background: #444; } .t-iron { background: #95a5a6; box-shadow: inset 0 0 10px #fff; }
        .t-gold { background: #f1c40f; box-shadow: 0 0 20px #f1c40f; }
        .t-ladder { background: rgba(0,242,255,0.2); border-left: 8px solid var(--neon); border-right: 8px solid var(--neon); }
        .t-bench { background: #e67e22; border: 4px solid #fff; box-shadow: 0 0 30px #e67e22; }

        /* Игрок и Освещение */
        #player { width: 32px; height: 52px; background: var(--neon); position: absolute; z-index: 1000; border-radius: 4px; box-shadow: 0 0 30px var(--neon); }
        #mouse-light { position: fixed; width: 800px; height: 800px; background: radial-gradient(circle, rgba(0,242,255,0.15) 0%, transparent 70%); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        #cursor { position: fixed; width: 15px; height: 15px; border: 2px solid #fff; border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); }

        /* UI */
        #hud { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 15px; border: 2px solid var(--neon); border-radius: 10px; z-index: 2000; }
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid var(--neon); padding: 30px; display: none; z-index: 5000; border-radius: 20px; text-align: center; width: 400px; max-height: 80vh; overflow-y: auto; }
        .menu-btn { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-weight: bold; border-radius: 5px; }
        .menu-btn:hover { background: var(--neon); color: #000; }
        .bind-active { background: var(--red) !important; color: #fff !important; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="mouse-light"></div>
    <div id="cursor"></div>
    <div id="world">
        <div id="player" style="left: 2000px; top: 1720px;"></div>
        <div id="tiles"></div>
    </div>

    <div id="hud">
        <b id="ui-res">W: 0 | I: 0 | G: 0</b><br>
        <div id="ui-info">БИОМ: ЛЕС</div>
    </div>

    <!-- Окно "Как играть" -->
    <div id="help-ui" class="window">
        <h2 style="color:var(--neon)">ИНСТРУКЦИЯ</h2>
        <p>A/D - Ходьба | SPACE - Прыжок<br>LMB - Копать | RMB - Строить<br>E - Крафт у верстака<br>F5 - Быстрое сохранение</p>
        <button class="menu-btn" onclick="closeW('help-ui')">ПОНЯТНО</button>
    </div>

    <!-- Окно настроек/биндов -->
    <div id="settings-ui" class="window">
        <h2 style="color:var(--neon)">НАСТРОЙКИ КЛАВИШ</h2>
        <div id="binds-list"></div>
        <button class="menu-btn" onclick="closeW('settings-ui')">НАЗАД</button>
    </div>

    <!-- Пауза -->
    <div id="pause-ui" class="window">
        <h1 style="color:var(--red)">PAUSE</h1>
        <button class="menu-btn" onclick="toggleP()">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="openW('help-ui')">КАК ИГРАТЬ?</button>
        <button class="menu-btn" onclick="openW('settings-ui')">БИНДЫ КЛАВИШ</button>
        <button class="menu-btn" onclick="changeL()" id="btn-lang">ЯЗЫК: RU</button>
        <button class="menu-btn" onclick="exportS()">СОХРАНИТЬ В ФАЙЛ</button>
        <button class="menu-btn" onclick="importS()">ЗАГРУЗИТЬ ФАЙЛ</button>
        <button class="menu-btn" onclick="location.reload()" style="color:red">ВЫХОД</button>
    </div>
</div>

<script>
    const cfg = { tw: 60, rows: 200, cols: 300, f: 0.85, a: 1.4, g: 0.8, j: -16 };
    let state = {
        x: 2000, y: 1720, vx: 0, vy: 0,
        inv: { wood: 0, iron: 0, gold: 0, lad: 0, dirt: 0 },
        isP: false, lang: 'ru', pwr: 0.25,
        binds: { left: 'KeyA', right: 'KeyD', jump: 'Space', craft: 'KeyE', build: 'KeyR' }
    };

    let worldMap = {}, keys = {}, bindingMode = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Звуковой движок
    function playSound(freq, type, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function init() {
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                // Генерация биомов
                if(r === 30) {
                    if(c < 100) type = 'snow'; 
                    else if(c > 200) type = 'sand';
                    else type = 'grass';
                } else if(r > 30) {
                    type = (r < 60) ? 'dirt' : 'stone';
                }
                if(r > 35 && Math.random() > 0.95) type = 'iron';
                if(r > 80 && Math.random() > 0.97) type = 'gold';
                if(type) addTile(r, c, type);
            }
        }
        addTile(29, 36, 'bench');
        renderBinds();
        loop();
    }

    function addTile(r, c, type) {
        const t = document.createElement('div');
        t.className = `tile t-${type}`;
        t.style.left = c * cfg.tw + 'px'; t.style.top = r * cfg.tw + 'px';
        document.getElementById('tiles').appendChild(t);
        worldMap[`${r}-${c}`] = { el: t, type, hp: 5, x: c*cfg.tw, y: r*cfg.tw };
    }

    function loop() {
        if(!state.isP) {
            if(keys[state.binds.left]) state.vx -= cfg.a;
            if(keys[state.binds.right]) state.vx += cfg.a;
            if(keys[state.binds.jump] && canJ) { state.vy = cfg.j; canJ = false; playSound(200, 'square', 0.1); }
            
            state.vx *= cfg.f; state.vy += cfg.g;
            let r = Math.floor((state.y + 30) / cfg.tw), c = Math.floor((state.x + 16) / cfg.tw);
            
            if(!checkCol(state.x + state.vx, state.y)) state.x += state.vx; else state.vx = 0;
            if(!checkCol(state.x, state.y + state.vy)) state.y += state.vy; 
            else { if(state.vy > 0) canJ = true; state.vy = 0; }
        }
        document.getElementById('player').style.transform = `translate3d(${state.x}px, ${state.y}px, 0)`;
        document.getElementById('world').style.transform = `translate3d(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px, 0)`;
        requestAnimationFrame(loop);
    }

    function checkCol(nx, ny) {
        let r = Math.floor((ny + 30) / cfg.tw), c = Math.floor((nx + 16) / cfg.tw);
        return (worldMap[`${r}-${c}`] && worldMap[`${r}-${c}`].type !== 'bench');
    }

    // Мышь и Бинды
    window.onmousemove = (e) => {
        document.getElementById('mouse-light').style.left = e.clientX + 'px';
        document.getElementById('mouse-light').style.top = e.clientY + 'px';
        document.getElementById('cursor').style.left = e.clientX + 'px';
        document.getElementById('cursor').style.top = e.clientY + 'px';
    };

    window.onmousedown = (e) => {
        if(state.isP) return;
        let rect = world.getBoundingClientRect();
        let mx = e.clientX - rect.left, my = e.clientY - rect.top;
        let r = Math.floor(my / cfg.tw), c = Math.floor(mx / cfg.tw), k = `${r}-${c}`;
        if(e.button === 0 && worldMap[k]) { // LMB
            worldMap[k].hp -= state.pwr; playSound(100, 'sine', 0.05);
            if(worldMap[k].hp <= 0) { worldMap[k].el.remove(); delete worldMap[k]; updateUI(); }
        }
    };

    window.onkeydown = (e) => {
        if(bindingMode) {
            state.binds[bindingMode] = e.code;
            bindingMode = null; renderBinds(); return;
        }
        keys[e.code] = true;
        if(e.code === 'Escape') toggleP();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function renderBinds() {
        const res = document.getElementById('binds-list');
        res.innerHTML = '';
        for(let b in state.binds) {
            let btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerText = `${b.toUpperCase()}: ${state.binds[b]}`;
            btn.onclick = () => { bindingMode = b; btn.classList.add('bind-active'); btn.innerText = 'НАЖМИ КЛАВИШУ...'; };
            res.appendChild(btn);
        }
    }

    function exportS() { 
        const d = btoa(JSON.stringify(state)); 
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([d], {type:"text/plain"})); 
        a.download = "neon_pc_mega.json"; a.click(); 
    }

    function importS() {
        const i = document.createElement("input"); i.type = "file";
        i.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files);
            r.onload = () => { state = JSON.parse(atob(r.result)); location.reload(); };
        }; i.click();
    }

    function toggleP() { state.isP = !state.isP; document.getElementById('pause-ui').style.display = state.isP ? 'flex' : 'none'; }
    function openW(id) { document.getElementById(id).style.display = 'block'; }
    function closeW(id) { document.getElementById(id).style.display = 'none'; }
    function updateUI() { document.getElementById('ui-res').innerText = `W: ${state.inv.wood} | I: ${state.inv.iron} | G: ${state.inv.gold}`; }
    
    let canJ = false; window.oncontextmenu = (e) => e.preventDefault();
    init();
</script>
</body>
</html>
