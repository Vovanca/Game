<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SAGA: THE RETURN</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --red: #ff4444; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; }
        #world { position: absolute; will-change: transform; }
        #sky { position: fixed; inset: 0; background: linear-gradient(to bottom, #001 0%, #4a90e2 50%, #87ceeb 100%); z-index: -1; }

        /* Блоки */
        .tile { position: absolute; width: 60px; height: 60px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.2); }
        .t-grass { background: #4caf50; border-top: 5px solid #1b5e20; }
        .t-dirt { background: #5d4037; }
        .t-stone { background: #424242; }
        .t-iron { background: #aaa; box-shadow: inset 0 0 10px #fff; }
        .t-gold { background: #ff0; box-shadow: 0 0 20px #ff0; }
        .t-ladder { background: rgba(0,242,255,0.3); border-left: 8px solid var(--neon); border-right: 8px solid var(--neon); }
        .t-bench { background: #ff9800; border: 4px solid #fff; box-shadow: 0 0 20px #f90; z-index: 10; font-weight: bold; color: #000; text-align: center; line-height: 50px; }

        /* Игрок */
        #player { width: 34px; height: 52px; background: var(--neon); position: absolute; z-index: 1000; border-radius: 4px; box-shadow: 0 0 30px var(--neon); }
        
        /* Интерфейс */
        #hud { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid var(--neon); border-radius: 12px; z-index: 2000; }
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid var(--neon); padding: 25px; display: none; z-index: 5000; border-radius: 20px; text-align: center; min-width: 300px; }
        .menu-btn { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* Боссы */
        .boss { position: absolute; padding: 40px; font-weight: bold; border-radius: 20px; border: 5px solid #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="sky"></div>
    <div id="world">
        <div id="player" style="left: 2000px; top: 1720px;"></div>
        <div id="tiles"></div>
        <!-- Боссы возвращены -->
        <div class="boss" style="left:2000px; top:-1000px; background:white; color:black;">COSMOS DRAGON</div>
        <div class="boss" style="left:8000px; top:1800px; background:green;">FOREST TITAN</div>
        <div class="boss" style="left:2000px; top:8000px; background:red;">VOID WARDEN</div>
    </div>

    <div id="hud">
        <b id="ui-inv">ДЕРЕВО: 0 | ЖЕЛЕЗО: 0 | ЗОЛОТО: 0</b><br>
        <span id="ui-quest" style="color:var(--gold)">Квест: Найди верстак (WORK)</span>
    </div>

    <!-- Верстак -->
    <div id="craft-ui" class="window">
        <h2 style="color:orange" id="txt-craft">ВЕРСТАК</h2>
        <button class="menu-btn" onclick="craft('lad')" id="btn-lad">Лестница (3 Wood)</button>
        <button class="menu-btn" onclick="craft('pick')" id="btn-pick">Бур (15 Iron)</button>
        <button class="menu-btn" onclick="closeW()">ЗАКРЫТЬ</button>
    </div>

    <!-- Пауза со всеми настройками -->
    <div id="pause-ui" class="window">
        <h1 id="txt-pause">ПАУЗА</h1>
        <button class="menu-btn" onclick="toggleP()">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="changeL()" id="btn-lang">ЯЗЫК: RU</button>
        <button class="menu-btn" onclick="exportS()" style="color:lightgreen">СОХРАНИТЬ В ФАЙЛ</button>
        <button class="menu-btn" onclick="importS()" style="color:lightblue">ЗАГРУЗИТЬ ФАЙЛ</button>
        <button class="menu-btn" onclick="location.reload()" style="color:red">RESTART</button>
    </div>

    <div onclick="toggleP()" style="position:fixed; top:15px; right:15px; padding:10px; background:#000; border:2px solid var(--neon); z-index:6000; cursor:pointer;">MENU</div>
</div>

<script>
    // Настройки и Состояние (Ничего не вырезано)
    const cfg = { tw: 60, rows: 200, cols: 200, f: 0.85, a: 1.5, g: 0.8, j: -16 };
    let state = {
        x: 2000, y: 1720, vx: 0, vy: 0,
        inv: { wood: 0, iron: 0, gold: 0, lad: 0, dirt: 0 },
        lang: 'ru', isP: false, pwr: 0.2
    };

    const str = {
        ru: { p: "ПАУЗА", q: "Квест: Найди верстак", cr: "ВЕРСТАК", cl: "ЗАКРЫТЬ", l: "ЯЗЫК: RU", w: "ДЕРЕВО", i: "ЖЕЛЕЗО", g: "ЗОЛОТО" },
        en: { p: "PAUSE", q: "Quest: Find workbench", cr: "WORKBENCH", cl: "CLOSE", l: "LANG: EN", w: "WOOD", i: "IRON", g: "GOLD" }
    };

    let worldMap = {}, keys = {}, canJ = false;
    const tilesCont = document.getElementById('tiles');

    function init() {
        for(let r=0; r<cfg.rows; r++) {
            for(let c=0; c<cfg.cols; c++) {
                let type = '';
                if(r === 30) type = 'grass';
                else if(r > 30 && r < 120) type = 'dirt';
                else if(r >= 120) type = 'stone';
                if(r > 35 && Math.random() > 0.94) type = 'iron';
                if(r > 90 && Math.random() > 0.96) type = 'gold';
                if(r === 29 && Math.random() > 0.9) type = 'wood';
                if(type) addTile(r, c, type);
            }
        }
        addTile(29, 36, 'bench');
        updateUI();
        requestAnimationFrame(loop);
    }

    function addTile(r, c, type) {
        const t = document.createElement('div');
        t.className = `tile t-${type}`;
        t.style.left = c * cfg.tw + 'px';
        t.style.top = r * cfg.tw + 'px';
        if(type==='bench') t.innerText = "WORK";
        tilesCont.appendChild(t);
        worldMap[`${r}-${c}`] = { el: t, type, hp: 5, x: c*cfg.tw, y: r*cfg.tw };
    }

    function checkCol(nx, ny) {
        let r = Math.floor((ny + 32) / cfg.tw), c = Math.floor((nx + 16) / cfg.tw);
        let b = worldMap[`${r}-${c}`];
        return (b && b.type !== 'ladder' && b.type !== 'bench');
    }

    function loop() {
        if(!state.isP) {
            // Клавиатура PC
            if(keys['KeyA']) state.vx -= cfg.a;
            if(keys['KeyD']) state.vx += cfg.a;
            if((keys['Space'] || keys['KeyW']) && canJ) { state.vy = cfg.j; canJ = false; }
            
            state.vx *= cfg.f;
            state.vy += cfg.g;

            let r = Math.floor((state.y + 32) / cfg.tw), c = Math.floor((state.x + 16) / cfg.tw);
            if(worldMap[`${r}-${c}`]?.type === 'ladder') state.vy = (keys['KeyW'] || keys['Space']) ? -10 : 1;

            if(!checkCol(state.x + state.vx, state.y)) state.x += state.vx; else state.vx = 0;
            if(!checkCol(state.x, state.y + state.vy)) state.y += state.vy; 
            else { if(state.vy > 0) canJ = true; state.vy = 0; }

            // Авто-открытие верстака
            if(worldMap[`${r}-${c+1}`]?.type === 'bench' || worldMap[`${r}-${c-1}`]?.type === 'bench') {
                document.getElementById('craft-ui').style.display = 'block';
            }
        }

        document.getElementById('player').style.transform = `translate3d(${state.x}px, ${state.y}px, 0)`;
        document.getElementById('world').style.transform = `translate3d(${-state.x + window.innerWidth/2}px, ${-state.y + window.innerHeight/2}px, 0)`;
        requestAnimationFrame(loop);
    }

    // Мышь (Копание)
    window.onmousedown = (e) => {
        if(state.isP) return;
        let rect = world.getBoundingClientRect();
        let mx = e.clientX - rect.left, my = e.clientY - rect.top;
        let r = Math.floor(my / cfg.tw), c = Math.floor(mx / cfg.tw), k = `${r}-${c}`;
        if(worldMap[k] && worldMap[k].type !== 'bench') {
            worldMap[k].hp -= state.pwr;
            worldMap[k].el.style.opacity = worldMap[k].hp / 5;
            if(worldMap[k].hp <= 0) {
                state.inv[worldMap[k].type === 'wood'?'wood':(worldMap[k].type==='iron'?'iron':(worldMap[k].type==='gold'?'gold':'dirt'))]++;
                worldMap[k].el.remove(); delete worldMap[k]; updateUI();
            }
        }
    };

    window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'Escape') toggleP(); };
    window.onkeyup = (e) => keys[e.code] = false;

    function craft(t) {
        if(t==='lad' && state.inv.wood >= 3) { state.inv.wood -= 3; state.inv.lad++; }
        if(t==='pick' && state.inv.iron >= 15) { state.inv.iron -= 15; state.pwr = 0.8; }
        updateUI();
    }

    function exportS() { 
        const d = btoa(JSON.stringify(state)); 
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([d], {type:"text/plain"})); 
        a.download = "save_pc.json"; a.click(); 
    }

    function importS() {
        const i = document.createElement("input"); i.type = "file";
        i.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files);
            r.onload = () => { state = JSON.parse(atob(r.result)); location.reload(); };
        }; i.click();
    }

    function updateUI() {
        let s = str[state.lang];
        document.getElementById('ui-inv').innerText = `${s.w}: ${state.inv.wood} | ${s.i}: ${state.inv.iron} | ${s.g}: ${state.inv.gold}`;
        document.getElementById('ui-quest').innerText = s.q;
        document.getElementById('txt-pause').innerText = s.p;
        document.getElementById('btn-lang').innerText = s.l;
    }

    function toggleP() { state.isP = !state.isP; document.getElementById('pause-ui').style.display = state.isP ? 'flex' : 'none'; }
    function changeL() { state.lang = state.lang === 'ru' ? 'en' : 'ru'; updateUI(); }
    function closeW() { document.getElementById('craft-ui').style.display = 'none'; }

    init();
</script>
</body>
</html>
